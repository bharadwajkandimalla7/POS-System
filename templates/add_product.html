<!DOCTYPE html>
<html>
<head>
<title>Add Product</title>

<style>

body{
    font-family: Arial;
    background: lightgreen;
}

.container{
    width:400px;
    margin:auto;
    margin-top:80px;
    background:white;
    padding:35px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#2c7be5;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1a5fd1;
}

.back{
    display:block;
    text-align:center;
    margin-top:15px;
    text-decoration:none;
    color:#555;
}

</style>

</head>

<body>

<div class="container">

<h2>Add Product</h2>

<form method="POST">

<input type="text" name="Name" placeholder="Product Name" required>

<input type="text" name="BarCode" placeholder="Bar Code" required>

<input type="text" name="category" placeholder="Category" required>

<input type="number" step="0.01" name="Price" placeholder="Price" required>

<input type="number" name="Quantity" placeholder="Quantity" required>

<button type="submit">Add Product</button>

</form>

<a class="back" href="/">⬅ Back to Menu</a>

</div>

</body>
</html>
