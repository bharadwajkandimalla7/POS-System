<!DOCTYPE html>
<html>
<head>
<title>All Products</title>

<style>

body{
    font-family: Arial;
    background: lightgreen;
}

.container{
    width:85%;
    margin:auto;
    margin-top:40px;
}

h1{
    text-align:center;
    color:#333;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

th{
    background:#2c7be5;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f5f7fa;
}

a{
    text-decoration:none;
}

.update{
    color:white;
    background:#28a745;
    padding:5px 10px;
    border-radius:4px;
}

.delete{
    color:white;
    background:#dc3545;
    padding:5px 10px;
    border-radius:4px;
}

.menu{
    display:block;
    margin-top:20px;
    text-align:center;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>All Products</h1>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>BarCode</th>
<th>Price</th>
<th>Category</th>
<th>Quantity</th>
<th>Actions</th>
</tr>

{% for p in products %}
<tr>
<td>{{p.product_id}}</td>
<td>{{p.Name}}</td>
<td>{{p.BarCode}}</td>
<td>{{p.Price}}</td>
<td>{{p.category}}</td>
<td>{{p.Quantity}}</td>

<td>
<a class="update" href="/update/{{p.product_id}}">Update</a>
<a class="delete" href="/delete/{{p.product_id}}">Delete</a>
</td>

</tr>
{% endfor %}

</table>

<a class="menu" href="/">⬅ Back to Menu</a>

</div>

</body>
</html>
